{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Jobored</title>
    <link rel="stylesheet" href="{% static "css/auth.css" %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="auth-container" style="max-width: 450px;">
        <div class="auth-card">
            <h2>Create an account</h2>
            <p class="subtitle">Join the community of top developers</p>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" name="username" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm password" required>
                </div>

                <div class="form-group">
                    <label>Register as</label>
                    <select name="role" required>
                        <option value="user">Freelancer / Job Seeker</option>
                        <option value="client">Employer / Client</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Profile Picture (Optional)</label>
                    <input type="file" name="profile_pic" accept="image/*">
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>
            <p style="color:red;">{{ error }}</p>

            <div class="auth-footer">
                Already have an account? <a href="{% url "login" %}">Log in</a>
            </div>
        </div>
</script>
</body>
</html>
